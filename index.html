<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>职引官 · AI面试实战平台</title>
    <!-- 字体与图标 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- 图表库（用于雷达图） -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: #f0f7ee;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        /* 手机容器 */
        .phone {
            max-width: 400px;
            width: 100%;
            background-color: white;
            position: relative;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            box-shadow: 0 0 20px rgba(0,40,0,0.1);
        }

        /* 主内容区域 - 可滚动 */
        .content {
            flex: 1;
            overflow-y: auto;
            padding: 20px 16px 20px;
            scrollbar-width: thin;
            scrollbar-color: #2c6e2c #e0f0e0;
        }

        .content::-webkit-scrollbar {
            width: 4px;
        }
        .content::-webkit-scrollbar-thumb {
            background-color: #2c6e2c;
            border-radius: 4px;
        }

        /* 底部导航栏 */
        .bottom-nav {
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding: 8px 0 12px;
            background-color: white;
            border-top: 1px solid #e0f0e0;
            box-shadow: 0 -2px 10px rgba(0,30,0,0.03);
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            color: #8a9e8a;
            font-size: 12px;
            transition: 0.2s;
            cursor: pointer;
            padding: 4px 12px;
            border-radius: 30px;
        }

        .nav-item i {
            font-size: 22px;
        }

        .nav-item.active {
            color: #2c6e2c;
            font-weight: 600;
        }

        /* 板块标题 */
        .section-title {
            font-size: 18px;
            font-weight: 700;
            color: #1a3a1a;
            margin: 20px 0 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .section-title i {
            color: #2c6e2c;
            font-size: 20px;
        }

        /* 卡片样式 */
        .card {
            background-color: white;
            border-radius: 24px;
            padding: 18px;
            margin-bottom: 16px;
            box-shadow: 0 4px 12px rgba(0,40,0,0.05);
            border: 1px solid #e0f0e0;
        }

        /* 知识库卡片 - 双列 */
        .knowledge-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-top: 8px;
        }

        .knowledge-item {
            background: white;
            border-radius: 20px;
            padding: 16px 12px;
            border: 1px solid #e0f0e0;
            box-shadow: 0 2px 8px rgba(0,30,0,0.02);
            cursor: pointer;
            transition: 0.2s;
        }
        .knowledge-item:active {
            background-color: #f0f7ee;
        }

        .company-tag {
            background-color: #e8f3e5;
            color: #2c6e2c;
            font-size: 12px;
            font-weight: 700;
            padding: 4px 10px;
            border-radius: 30px;
            display: inline-block;
            margin-bottom: 10px;
        }

        .position-name {
            font-weight: 700;
            font-size: 16px;
            margin-bottom: 6px;
            color: #1e3a1e;
        }

        .question-preview {
            font-size: 13px;
            color: #4f6b4f;
            margin: 8px 0;
            line-height: 1.4;
        }

        .type-badge {
            font-size: 11px;
            background-color: #f0f7ee;
            padding: 4px 8px;
            border-radius: 30px;
            display: inline-block;
        }

        /* 头像 */
        .avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background-color: #2c6e2c;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 20px;
        }

        /* 导师卡片横向滚动 */
        .mentor-row {
            display: flex;
            gap: 12px;
            overflow-x: auto;
            padding: 4px 0 16px;
            scrollbar-width: thin;
        }

        .mentor-card {
            min-width: 140px;
            background: #f8fcf7;
            border-radius: 24px;
            padding: 16px;
            border: 1px solid #d0e8d0;
            cursor: pointer;
        }
        .mentor-card:active {
            background-color: #e8f3e5;
        }

        /* 论坛帖子项 */
        .forum-item {
            display: flex;
            justify-content: space-between;
            padding: 16px 0;
            border-bottom: 1px solid #edf5eb;
            cursor: pointer;
        }
        .forum-item:active {
            background-color: #f8fcf7;
        }

        /* 按钮样式 */
        .btn-primary {
            background: #2c6e2c;
            color: white;
            border: none;
            padding: 16px;
            border-radius: 60px;
            width: 100%;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            transition: 0.2s;
        }
        .btn-primary:active {
            background: #1e4f1e;
        }

        .btn-outline {
            background: transparent;
            color: #2c6e2c;
            border: 2px solid #2c6e2c;
            padding: 14px;
            border-radius: 60px;
            width: 100%;
            font-weight: 600;
            cursor: pointer;
        }

        /* 输入框 */
        .input-field {
            width: 100%;
            padding: 16px;
            border: 1px solid #d0e0d0;
            border-radius: 30px;
            font-size: 16px;
            margin-bottom: 16px;
            outline: none;
        }
        .input-field:focus {
            border-color: #2c6e2c;
        }

        /* 弹窗 */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .modal-content {
            background: white;
            width: 90%;
            max-width: 350px;
            border-radius: 40px;
            padding: 24px;
        }

        /* 返回按钮 */
        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: #2c6e2c;
            font-weight: 600;
            margin-bottom: 20px;
            cursor: pointer;
        }

        /* 评论区域 */
        .comment-item {
            padding: 16px 0;
            border-bottom: 1px solid #edf5eb;
        }

        /* 加载动画 */
        .loading {
            text-align: center;
            padding: 40px;
            color: #2c6e2c;
        }

        /* 积分徽章 */
        .points-badge {
            background: #2c6e2c;
            color: white;
            padding: 6px 12px;
            border-radius: 30px;
            font-size: 14px;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        /* 雷达图容器 */
        .radar-container {
            width: 100%;
            height: 250px;
            margin: 20px 0;
        }
    </style>
</head>
<body>
    <div class="phone" id="app"></div>

    <script>
        // ==================== 全局配置 ====================
        const API_BASE = 'http://localhost:3000/api';
        
        // ==================== 状态管理 ====================
        let currentUser = null;
        let currentTab = 'home';
        let forumPosts = [];
        let knowledgeData = [];
        let mentors = [];
        let interviewHistory = [];

        // DOM 元素
        const app = document.getElementById('app');

        // ==================== 初始化 ====================
        async function init() {
            const savedUser = localStorage.getItem('currentUser');
            if (savedUser) {
                currentUser = JSON.parse(savedUser);
                await loadInitialData();
                renderMainApp();
                loadTabContent('home');
            } else {
                renderLogin();
            }
        }

        // ==================== 加载初始数据 ====================
        async function loadInitialData() {
            try {
                // 加载知识库
                const knowledgeRes = await fetch(`${API_BASE}/knowledge`);
                knowledgeData = await knowledgeRes.json();

                // 加载论坛帖子
                const forumRes = await fetch(`${API_BASE}/forum/posts`);
                forumPosts = await forumRes.json();

                // 加载导师
                const mentorRes = await fetch(`${API_BASE}/mentors`);
                mentors = await mentorRes.json();

                // 加载面试历史
                if (currentUser) {
                    const historyRes = await fetch(`${API_BASE}/interview/history/${currentUser.id}`);
                    interviewHistory = await historyRes.json();
                }
            } catch (error) {
                console.error('加载数据失败:', error);
                // 使用模拟数据
                knowledgeData = [
                    { id: 1, position: '产品经理', company: '字节跳动', interview_questions: '你觉得抖音为什么火？如何提升用户留存？', experience_type: '面经' },
                    { id: 2, position: 'Java开发', company: '阿里巴巴', interview_questions: 'HashMap原理？JVM内存模型？', experience_type: '面经' },
                    { id: 3, position: '公务员', company: '税务局', interview_questions: '如何看待放管服改革？', experience_type: '凉经' }
                ];
                forumPosts = [
                    { id: 1, title: '字节跳动运营岗凉经', author_name: '求职小白', reply_count: 35, content: '刚面完字节跳动运营岗...' },
                    { id: 2, title: '北大法硕复试真题回忆', author_name: '法学僧', reply_count: 12, content: '北大法硕复试经验...' }
                ];
                mentors = [
                    { id: 1, name: '赵老师', company: '腾讯', position: '产品策划', experience: '3年', rating: 4.9 },
                    { id: 2, name: '钱工', company: '阿里', position: 'Java架构', experience: '8年', rating: 5.0 }
                ];
            }
        }
                // ==================== 登录界面 ====================
        function renderLogin() {
            app.innerHTML = `
                <div class="content" style="display: flex; flex-direction: column; justify-content: center; min-height: 100vh;">
                    <div style="text-align: center; margin-bottom: 40px;">
                        <div style="background: #2c6e2c; width: 80px; height: 80px; border-radius: 24px; display: flex; align-items: center; justify-content: center; color: white; font-size: 40px; margin: 0 auto 20px;">
                            <i class="fas fa-robot"></i>
                        </div>
                        <h1 style="font-size: 32px; font-weight: 800; color: #1a3a1a;">职引官</h1>
                        <p style="color: #4f6b4f; margin-top: 8px;">AI面试实战平台</p>
                    </div>

                    <div class="card" style="margin-bottom: 20px;">
                        <h3 style="margin-bottom: 20px;">登录</h3>
                        <input type="text" id="login-username" class="input-field" placeholder="用户名">
                        <input type="password" id="login-password" class="input-field" placeholder="密码">
                        <button class="btn-primary" onclick="handleLogin()" style="margin-bottom: 12px;">登录</button>
                        <p style="text-align: center; color: #4f6b4f;">
                            还没有账号？ <span style="color: #2c6e2c; font-weight: 600; cursor: pointer;" onclick="renderRegister()">立即注册</span>
                        </p>
                    </div>
                </div>
            `;
        }

        // ==================== 注册界面 ====================
        function renderRegister() {
            app.innerHTML = `
                <div class="content" style="display: flex; flex-direction: column; justify-content: center; min-height: 100vh;">
                    <div style="text-align: center; margin-bottom: 40px;">
                        <div style="background: #2c6e2c; width: 80px; height: 80px; border-radius: 24px; display: flex; align-items: center; justify-content: center; color: white; font-size: 40px; margin: 0 auto 20px;">
                            <i class="fas fa-robot"></i>
                        </div>
                        <h1 style="font-size: 32px; font-weight: 800; color: #1a3a1a;">职引官</h1>
                        <p style="color: #4f6b4f; margin-top: 8px;">注册新账号</p>
                    </div>

                    <div class="card" style="margin-bottom: 20px;">
                        <h3 style="margin-bottom: 20px;">注册</h3>
                        <input type="text" id="register-username" class="input-field" placeholder="用户名">
                        <input type="password" id="register-password" class="input-field" placeholder="密码">
                        <input type="text" id="register-nickname" class="input-field" placeholder="昵称">
                        <button class="btn-primary" onclick="handleRegister()" style="margin-bottom: 12px;">注册</button>
                        <p style="text-align: center; color: #4f6b4f;">
                            已有账号？ <span style="color: #2c6e2c; font-weight: 600; cursor: pointer;" onclick="renderLogin()">立即登录</span>
                        </p>
                    </div>
                </div>
            `;
        }

        // ==================== 处理登录 ====================
        async function handleLogin() {
            const username = document.getElementById('login-username')?.value;
            const password = document.getElementById('login-password')?.value;

            if (!username || !password) {
                alert('请输入用户名和密码');
                return;
            }

            try {
                const response = await fetch(`${API_BASE}/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                const data = await response.json();

                if (response.ok) {
                    currentUser = data.user;
                    localStorage.setItem('currentUser', JSON.stringify(currentUser));
                    
                    await loadInitialData();
                    renderMainApp();
                    loadTabContent('home');
                } else {
                    alert(data.error || '登录失败');
                }
            } catch (error) {
                console.error('登录错误:', error);
                alert('登录失败，请检查网络');
            }
        }

        // ==================== 处理注册 ====================
        async function handleRegister() {
            const username = document.getElementById('register-username')?.value;
            const password = document.getElementById('register-password')?.value;
            const nickname = document.getElementById('register-nickname')?.value || username;

            if (!username || !password) {
                alert('请输入用户名和密码');
                return;
            }

            try {
                const response = await fetch(`${API_BASE}/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password, nickname })
                });

                const data = await response.json();

                if (response.ok) {
                    alert('注册成功，请登录');
                    renderLogin();
                } else {
                    alert(data.error || '注册失败');
                }
            } catch (error) {
                console.error('注册错误:', error);
                alert('注册失败，请检查网络');
            }
        }

        // ==================== 退出登录 ====================
        function logout() {
            localStorage.removeItem('currentUser');
            currentUser = null;
            renderLogin();
        }

        // ==================== 渲染主应用 ====================
        function renderMainApp() {
            app.innerHTML = `
                <!-- 主内容区域 -->
                <div class="content" id="main-content"></div>

                <!-- 底部导航栏 -->
                <div class="bottom-nav" id="bottom-nav">
                    <div class="nav-item active" data-tab="home">
                        <i class="fas fa-home"></i>
                        <span>首页</span>
                    </div>
                    <div class="nav-item" data-tab="knowledge">
                        <i class="fas fa-database"></i>
                        <span>知识库</span>
                    </div>
                    <div class="nav-item" data-tab="interview">
                        <i class="fas fa-microphone"></i>
                        <span>AI面试</span>
                    </div>
                    <div class="nav-item" data-tab="consult">
                        <i class="fas fa-comments"></i>
                        <span>咨询</span>
                    </div>
                    <div class="nav-item" data-tab="profile">
                        <i class="fas fa-user"></i>
                        <span>我的</span>
                    </div>
                </div>
            `;

            // 绑定导航事件
            document.querySelectorAll('.nav-item').forEach(item => {
                item.addEventListener('click', function() {
                    document.querySelectorAll('.nav-item').forEach(nav => nav.classList.remove('active'));
                    this.classList.add('active');
                    currentTab = this.getAttribute('data-tab');
                    loadTabContent(currentTab);
                });
            });
        }

        // ==================== 加载Tab内容 ====================
        async function loadTabContent(tab) {
            const contentDiv = document.getElementById('main-content');
            if (!contentDiv) return;
            
            switch(tab) {
                case 'home':
                    renderHome(contentDiv);
                    break;
                case 'knowledge':
                    await renderKnowledge(contentDiv);
                    break;
                case 'interview':
                    renderInterview(contentDiv);
                    break;
                case 'consult':
                    renderConsult(contentDiv);
                    break;
                case 'profile':
                    renderProfile(contentDiv);
                    break;
            }
        }

        // ==================== 辅助函数 ====================
        function switchTab(tab) {
            const navItem = Array.from(document.querySelectorAll('.nav-item')).find(
                item => item.getAttribute('data-tab') === tab
            );
            if (navItem) {
                navItem.click();
            }
        }

        // ==================== 显示积分 ====================
        async function updateUserPoints() {
            if (!currentUser) return;
            try {
                const res = await fetch(`${API_BASE}/user/${currentUser.id}/points`);
                const data = await res.json();
                currentUser.points = data.points;
                localStorage.setItem('currentUser', JSON.stringify(currentUser));
            } catch (error) {
                console.error('获取积分失败:', error);
            }
        }
                // ==================== 首页 ====================
        function renderHome(container) {
            // 确保有数据
            const hotKnowledge = knowledgeData.slice(0, 4);
            const topMentors = mentors.slice(0, 3);
            
            container.innerHTML = `
                <div style="padding: 8px 0 20px;">
                    <!-- 欢迎语和积分 -->
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                        <div>
                            <h2 style="font-size: 24px;">欢迎回来，</h2>
                            <p style="color: #2c6e2c; font-weight: 600;">${currentUser?.nickname || currentUser?.username}</p>
                        </div>
                        <div style="display: flex; align-items: center; gap: 12px;">
                            <div class="points-badge">
                                <i class="fas fa-coins"></i> ${currentUser?.points || 0}
                            </div>
                            <div class="avatar">${(currentUser?.nickname || currentUser?.username || 'U').charAt(0)}</div>
                        </div>
                    </div>

                    <!-- 快捷入口 -->
                    <div class="section-title">
                        <i class="fas fa-th-large"></i> 核心功能
                    </div>
                    <div style="display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 24px;">
                        <div class="card" style="padding: 16px 8px; text-align: center; margin: 0;" onclick="switchTab('knowledge')">
                            <i class="fas fa-database" style="font-size: 28px; color: #2c6e2c;"></i>
                            <div style="font-size: 12px; font-weight: 600; margin-top: 6px;">知识库</div>
                        </div>
                        <div class="card" style="padding: 16px 8px; text-align: center; margin: 0;" onclick="switchTab('interview')">
                            <i class="fas fa-robot" style="font-size: 28px; color: #2c6e2c;"></i>
                            <div style="font-size: 12px; font-weight: 600; margin-top: 6px;">AI面试</div>
                        </div>
                        <div class="card" style="padding: 16px 8px; text-align: center; margin: 0;" onclick="switchTab('consult')">
                            <i class="fas fa-handshake" style="font-size: 28px; color: #2c6e2c;"></i>
                            <div style="font-size: 12px; font-weight: 600; margin-top: 6px;">在职咨询</div>
                        </div>
                        <div class="card" style="padding: 16px 8px; text-align: center; margin: 0;" onclick="switchTab('profile')">
                            <i class="fas fa-user" style="font-size: 28px; color: #2c6e2c;"></i>
                            <div style="font-size: 12px; font-weight: 600; margin-top: 6px;">个人中心</div>
                        </div>
                    </div>

                    <!-- 热门面经 -->
                    <div class="section-title">
                        <i class="fas fa-fire"></i> 热门面经
                        <span style="margin-left: auto; font-size: 14px; color: #2c6e2c;" onclick="switchTab('knowledge')">查看更多</span>
                    </div>
                    <div class="knowledge-grid">
                        ${hotKnowledge.map(item => `
                            <div class="knowledge-item" onclick="showKnowledgeDetail(${item.id})">
                                <span class="company-tag">${item.company || '未知'}</span>
                                <div class="position-name">${item.position || '岗位'}</div>
                                <div class="question-preview">${(item.interview_questions || '暂无问题').substring(0, 20)}...</div>
                                <span class="type-badge">${item.experience_type || '面经'}</span>
                            </div>
                        `).join('')}
                    </div>

                    <!-- 推荐导师 -->
                    <div class="section-title">
                        <i class="fas fa-star"></i> 推荐导师
                        <span style="margin-left: auto; font-size: 14px; color: #2c6e2c;" onclick="switchTab('consult')">查看更多</span>
                    </div>
                    <div class="mentor-row">
                        ${topMentors.map(mentor => `
                            <div class="mentor-card" onclick="showMentorDetail(${mentor.id})">
                                <div style="font-weight: 700;">${mentor.company}</div>
                                <div style="font-size: 16px; margin: 8px 0;">${mentor.name}</div>
                                <div style="font-size: 12px; color: #4f6b4f;">${mentor.position}</div>
                                <div style="margin-top: 12px; display: flex; justify-content: space-between; align-items: center;">
                                    <span style="color: #f5b342;">★ ${mentor.rating || 5.0}</span>
                                    <span style="color: #2c6e2c; font-size: 13px;">预约</span>
                                </div>
                            </div>
                        `).join('')}
                    </div>

                    <!-- 最新帖子预览 -->
                    <div class="section-title">
                        <i class="fas fa-comments"></i> 最新讨论
                        <span style="margin-left: auto; font-size: 14px; color: #2c6e2c;" onclick="switchTab('forum')">进入论坛</span>
                    </div>
                    ${forumPosts.slice(0, 3).map(post => `
                        <div class="forum-item" onclick="showPostDetail(${post.id})">
                            <div>
                                <i class="fas fa-circle" style="color: #2c6e2c; font-size: 8px;"></i>
                                ${post.title}

            const answer = document.getElementById('interview-answer')?.value;

                currentInterview.answers[currentInterview.currentIndex] = answer;

        // ==================== 完成面试 ====================
        async function finishInterview() {
            // 计算得分（简单模拟）
            const score = calculateInterviewScore();
            
            // 保存到历史
            const interviewRecord = {
                userId: currentUser.id,
                type: currentInterview.type,
                questions: JSON.stringify(currentInterview.questions),
                answers: JSON.stringify(currentInterview.answers),
                score: score
            };

            try {
                await fetch(`${API_BASE}/interview/save`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(interviewRecord)
                });

                // 重新加载历史
                const historyRes = await fetch(`${API_BASE}/interview/history/${currentUser.id}`);
                interviewHistory = await historyRes.json();

                // 显示报告
                showInterviewReport(null, {
                    type: currentInterview.type,
                    questions: currentInterview.questions,
                    answers: currentInterview.answers,
                    score: score,
                    created_at: new Date()
                });

            } catch (error) {
                console.error('保存面试记录失败:', error);
                // 即使保存失败，也显示报告
                showInterviewReport(null, {
                    type: currentInterview.type,
                    questions: currentInterview.questions,
                    answers: currentInterview.answers,
                    score: score,
                    created_at: new Date()
                });
            }
        }

        // ==================== 计算得分 ====================
        function calculateInterviewScore() {
            const answers = currentInterview.answers;
            if (!answers || answers.length === 0) return 0;
            
            // 简单评分：根据回答长度和关键词
            let totalScore = 0;
            answers.forEach((ans, i) => {
                if (!ans) return;
                
                let qScore = 60; // 基础分
                
                // 长度评分
                if (ans.length > 100) qScore += 20;
                else if (ans.length > 50) qScore += 10;
                
                // 关键词评分（简单模拟）
                const keywords = ['项目', '经验', '学习', '团队', '解决', '方法', '结果'];
                keywords.forEach(kw => {
                    if (ans.includes(kw)) qScore += 5;
                });
                
                totalScore += Math.min(qScore, 100);
            });
            
            return Math.round(totalScore / answers.length);
        }

            if (recordId) {
                record = interviewHistory.find(r => r.id === recordId);

        // ==================== 生成能力分数 ====================
        function generateAbilityScores(baseScore) {
            // 根据基础分生成各项能力分数
            const variance = 15;
            return [
                Math.min(100, baseScore + (Math.random() * variance - variance/2)),
                Math.min(100, baseScore + (Math.random() * variance - variance/2)),
                Math.min(100, baseScore + (Math.random() * variance - variance/2)),
                Math.min(100, baseScore + (Math.random() * variance - variance/2)),
                Math.min(100, baseScore + (Math.random() * variance - variance/2)),
                Math.min(100, baseScore + (Math.random() * variance - variance/2))
            ].map(s => Math.max(40, Math.round(s)));
        }

                return `<p style="color: #f5b342;">👍 良好！有一定基础，建议针对薄弱环节加强练习。</p>`;

            }
        }

        // ==================== 获取优化建议 ====================

            if (!answer || answer.length < 20) {
                return '回答过于简短，建议结合具体案例详细阐述。';
            }
            if (!answer.includes('我') && !answer.includes('项目')) {
                return '建议多使用第一人称，结合个人实际经验回答。';
            }
            if (answer.length > 200) {
                return '回答较长，注意控制时间，突出重点。';
            }
            return '回答不错，可以尝试用STAR法则（情境、任务、行动、结果）组织语言。';
        }

        // ==================== 提交预约 ====================
        async function submitBooking(mentorId, type) {
            const time = document.getElementById('booking-time')?.value;
            const message = document.getElementById('booking-message')?.value;

            if (!time) {
                alert('请选择预约时间');
                return;
            }

            // 检查积分
            if ((currentUser?.points || 0) < 50) {
                alert('积分不足，请先获取积分（发帖、评论可得积分）');
                document.querySelector('.modal')?.remove();
                return;
            }

            try {
                const response = await fetch(`${API_BASE}/bookings`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        userId: currentUser.id,
                        mentorId: mentorId,
                        type: type,
                        time: time
                    })
                });

                if (response.ok) {
                    alert('预约成功！已扣除50积分');
                    
                    // 更新积分
                    currentUser.points -= 50;
                    localStorage.setItem('currentUser', JSON.stringify(currentUser));
                    
                    document.querySelector('.modal')?.remove();
                } else {
                    alert('预约失败，请重试');
                }
            } catch (error) {
                console.error('预约失败:', error);
                alert('预约失败，请检查网络');
            }
        }

                            <div style="color: #8aa08a; font-size: 14px; margin: 8px 0;">${post.reply_count || 0}回复 · ${new Date(post.created_at).toLocaleDateString()}</div>
                        </div>
                    `).join('')}
                </div>
            `;
        }

        // ==================== 我的预约 ====================
        function showMyBookings() {
            // 模拟数据
            const bookings = [
                { id: 1, mentor: '赵老师', type: '咨询', time: '2026-03-07 10:00', status: '待确认' },
                { id: 2, mentor: '钱工', type: '模拟面试', time: '2026-03-08 14:00', status: '已确认' }
            ];

            const contentDiv = document.getElementById('main-content');
            contentDiv.innerHTML = `
                <div style="padding: 8px 0 20px;">
                    <div class="back-btn" onclick="loadTabContent('profile')">

                    </div>

                    <div class="section-title">
                        <i class="fas fa-calendar"></i> 我的预约
                    </div>

                    ${bookings.map(b => `
                        <div class="card">
                            <div style="display: flex; justify-content: space-between;">
                                <span style="font-weight: 600;">${b.mentor}</span>
                                <span style="color: ${b.status === '已确认' ? '#2c6e2c' : '#f5b342'}">${b.status}</span>
                            </div>
                            <div style="margin: 8px 0;">${b.type} · ${b.time}</div>
                        </div>
                    `).join('')}
                </div>
            `;
        }

        // ==================== 积分明细 ====================
        function showPointsDetail() {
            // 模拟积分明细
            const pointsLog = [
                { action: '发布面经', points: 20, time: '2026-03-06' },
                { action: '发表评论', points: 5, time: '2026-03-06' },
                { action: '完成AI面试', points: 15, time: '2026-03-05' },
                { action: '每日签到', points: 10, time: '2026-03-05' }
            ];

            const contentDiv = document.getElementById('main-content');
            contentDiv.innerHTML = `
                <div style="padding: 8px 0 20px;">
                    <div class="back-btn" onclick="loadTabContent('profile')">
                        <i class="fas fa-arrow-left"></i> 返回个人中心
                    </div>

                    <div class="section-title">
                        <i class="fas fa-coins"></i> 积分明细
                    </div>

                    <div class="card" style="text-align: center;">
                        <div style="font-size: 48px; font-weight: 700; color: #2c6e2c;">${currentUser?.points || 0}</div>
                        <div>当前总积分</div>
                    </div>

                    ${pointsLog.map(log => `
                        <div class="forum-item">
                            <div>
                                <span style="font-weight: 600;">${log.action}</span>
                                <div style="font-size: 12px; color: #8aa08a;">${log.time}</div>
                            </div>
                            <span style="color: #2c6e2c;">+${log.points}</span>
                        </div>
                    `).join('')}
                </div>
            `;
        }

        // ==================== 设置 ====================
        function showSettings() {
            const contentDiv = document.getElementById('main-content');
            contentDiv.innerHTML = `
                <div style="padding: 8px 0 20px;">
                    <div class="back-btn" onclick="loadTabContent('profile')">
                        <i class="fas fa-arrow-left"></i> 返回个人中心
                    </div>

                    <div class="section-title">
                        <i class="fas fa-cog"></i> 设置
                    </div>

                    <div class="card">
                        <div class="forum-item">
                            <span><i class="fas fa-bell"></i> 消息通知</span>
                            <label class="switch">
                                <input type="checkbox" checked>
                            </label>
                        </div>
                        <div class="forum-item">
                            <span><i class="fas fa-moon"></i> 深色模式</span>
                            <label class="switch">
                                <input type="checkbox">
                            </label>
                        </div>
                        <div class="forum-item" onclick="alert('修改密码功能开发中')">
                            <span><i class="fas fa-key"></i> 修改密码</span>
                            <i class="fas fa-chevron-right"></i>
                        </div>
                        <div class="forum-item" onclick="alert('关于我们')">
                            <span><i class="fas fa-info-circle"></i> 关于我们</span>
                            <i class="fas fa-chevron-right"></i>
                        </div>
                        <div class="forum-item" onclick="alert('用户协议')">
                            <span><i class="fas fa-file-contract"></i> 用户协议</span>
                            <i class="fas fa-chevron-right"></i>
                        </div>
                    </div>

                    <button class="btn-outline" style="margin-top: 20px; color: #c00; border-color: #c00;" onclick="logout()">
                        退出登录
                    </button>
                </div>
            `;

            // 添加开关样式
            const style = document.createElement('style');
            style.textContent = `
                .switch {
                    position: relative;
                    display: inline-block;
                    width: 50px;
                    height: 24px;
                }
                .switch input {
                    opacity: 0;
                    width: 0;
                    height: 0;
                }
                .slider {
                    position: absolute;
                    cursor: pointer;
                    top: 0;
                    left: 0;
                    right: 0;
                    bottom: 0;
                    background-color: #ccc;
                    transition: .4s;
                    border-radius: 34px;
                }
                .slider:before {
                    position: absolute;
                    content: "";
                    height: 20px;
                    width: 20px;
                    left: 2px;
                    bottom: 2px;
                    background-color: white;
                    transition: .4s;
                    border-radius: 50%;
                }
                input:checked + .slider {
                    background-color: #2c6e2c;
                }
                input:checked + .slider:before {
                    transform: translateX(26px);
                }
            `;
            document.head.appendChild(style);
        }

        // ==================== 每日签到 ====================
        async function dailyCheckin() {
            // 模拟签到功能
            alert('签到成功！获得10积分');
            currentUser.points += 10;
            localStorage.setItem('currentUser', JSON.stringify(currentUser));
            loadTabContent('profile');
        }

        // ==================== 初始化 ====================
        init();
    </script>
</body>
